<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Copywriter · Brand OS</title>
<link rel="icon" type="image/svg+xml" href="/brand-os/symbol.svg">
<link rel="stylesheet" href="/brand-os/style.css">
<style>
  .history {
    display: flex; flex-direction: column; gap: var(--space-2);
    max-height: 320px; overflow-y: auto;
    padding-right: 4px;
  }
  .history-item {
    border: 1px solid var(--sc-hairline);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    cursor: pointer;
    transition: border-color var(--dur-fast) var(--ease),
                background var(--dur-fast) var(--ease);
  }
  .history-item:hover { border-color: var(--sc-hairline-strong); background: rgba(255,255,255,0.04); opacity: 1; }
  .history-item .meta {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: var(--tracking-mono); text-transform: uppercase;
    color: var(--sc-mist); margin-bottom: 6px;
  }
  .history-item .body {
    font-family: var(--font-display); font-size: 14px;
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="sc-page">
  <header class="sc-topbar">
    <div class="left"><span class="sc-wordmark"><img src="/brand-os/logo.svg" alt="Spacecadet Studio" class="sc-logo"></span></div>
    <div class="center" id="brandTag">— · copywriter</div>
    <div class="right sc-meta-lines">NYC, Planet Earth
<span class="sc-clock">00:00:00</span></div>
  </header>

  <main style="align-self: center; max-width: 1300px; width: 100%; display: flex; flex-direction: column; gap: var(--space-6);">
    <div>
      <div class="sc-tag"><span class="num">01</span> Locked to your voice</div>
      <h1 class="sc-h1" style="margin-top: 6px;">Copywriter</h1>
    </div>

    <div style="display: grid; grid-template-columns: 1.05fr 1.15fr 0.85fr; gap: var(--space-5);">
      <!-- SOURCE -->
      <div class="sc-card" style="gap: var(--space-4);">
        <div class="sc-eyebrow">Source</div>
        <div>
          <div class="sc-eyebrow" style="margin-bottom: 8px;">Mode</div>
          <div class="sc-row" style="justify-content: space-between; align-items: center; gap: var(--space-3); flex-wrap: nowrap;">
            <div class="sc-navrow" id="modes"></div>
            <div class="sc-row" style="align-items: center; gap: var(--space-3); flex-wrap: nowrap;">
              <span class="sc-status" id="status"></span>
              <button class="sc-pill solid" id="go">Go →</button>
            </div>
          </div>
        </div>
        <div class="sc-field">
          <label id="sourceLabel" class="sc-eyebrow" style="margin-bottom: 6px;">Source text</label>
          <textarea id="source" placeholder="Paste the text to rewrite — a headline, a paragraph, a raw idea."></textarea>
        </div>
        <div>
          <div class="sc-eyebrow" style="margin-bottom: 8px;">Task</div>
          <div class="sc-navrow" id="presets"></div>
        </div>
        <div>
          <div class="sc-eyebrow" style="margin-bottom: 8px;">Word count</div>
          <div class="sc-navrow" id="wordcounts"></div>
        </div>
      </div>

      <!-- RESULT -->
      <div class="sc-card" style="gap: var(--space-4);">
        <div class="sc-eyebrow">Result</div>
        <div id="output" class="sc-field" style="min-height: 340px; flex: 1; border: var(--border-thin) solid var(--sc-hairline); border-radius: var(--radius-sm); padding: 16px; white-space: pre-wrap; line-height: 1.55; font-family: var(--font-display); color: var(--sc-ink);">
          <span class="sc-eyebrow">Waiting for input</span>
        </div>
        <div class="sc-row">
          <button class="sc-pill mono small" id="copy" disabled>Copy</button>
          <button class="sc-pill mono small" id="reroll" disabled>Reroll</button>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="sc-card" style="gap: var(--space-3);">
        <div class="sc-row" style="justify-content: space-between; align-items: baseline;">
          <div class="sc-eyebrow">History (this session)</div>
          <button class="sc-pill mono small" id="clearHist">Clear</button>
        </div>
        <div class="history" id="history"></div>
      </div>
    </div>
  </main>

  <footer class="sc-botbar">
    <div class="left"><a href="#" id="backLink" class="sc-pill small mono">← Hub</a></div>
    <div class="center"></div>
    <div class="right"><a href="#" id="logout" class="sc-pill small mono">Sign out</a></div>
  </footer>
</div>

<script src="/brand-os/starfield.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const pathSlug = (location.pathname.match(/^\/([a-z][a-z0-9-]{1,40})\/(copywriter|art-director)\/?$/) || [])[1];
  const slug = params.get('slug') || pathSlug;
  document.getElementById('backLink').href = `/${encodeURIComponent(slug || '')}`;

  const HIST_KEY = `brandos:copywriter:${slug}`;
  let activePreset = null;
  let activeWordCount = null;
  let activeMode = 'write';

  const MODE_COPY = {
    rewrite: {
      label: 'Source text',
      placeholder: 'Paste the text to rewrite — a headline, a paragraph, a raw idea.',
    },
    write: {
      label: 'Brief',
      placeholder: 'Describe what you need — "a LinkedIn post announcing the SLAM release", "three headline options for the collision-avoidance page".',
    },
  };
  function applyMode(m) {
    activeMode = m;
    document.getElementById('sourceLabel').textContent = MODE_COPY[m].label;
    document.getElementById('source').placeholder = MODE_COPY[m].placeholder;
  }

  (async () => {
    if (!slug) { location.href = '/login'; return; }
    const r = await fetch('/api/brand-os/session', { credentials: 'same-origin' });
    if (!r.ok) { location.href = `/login?next=${encodeURIComponent(location.pathname + location.search)}`; return; }
    const me = await r.json();
    document.getElementById('brandTag').textContent = `${(me.name || slug).toUpperCase()} · COPYWRITER`;

    // Write / Rewrite mode pills.
    const mwrap = document.getElementById('modes');
    [['write', 'Write'], ['rewrite', 'Rewrite']].forEach(([m, label], i) => {
      const b = document.createElement('button');
      b.className = 'sc-pill mono small';
      b.textContent = label;
      b.onclick = () => {
        applyMode(m);
        mwrap.querySelectorAll('.sc-pill').forEach(el => el.classList.remove('active'));
        b.classList.add('active');
      };
      if (i === 0) b.click();
      mwrap.appendChild(b);
    });

    // Preset pills come from the brand config; fall back to the classic set.
    let presets = ['Social post', 'Tagline', 'Headline', 'Explain simply', 'Tighten'];
    try {
      const hubRes = await fetch(`/api/brand-os/hub?slug=${encodeURIComponent(slug)}`, { credentials: 'same-origin' });
      const hub = await hubRes.json();
      const fromBrand = (hub.presets?.copywriter || []).map(p => p.label).filter(Boolean);
      if (fromBrand.length) presets = fromBrand;
    } catch {}
    const pwrap = document.getElementById('presets');
    presets.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'sc-pill mono small';
      b.textContent = p;
      b.onclick = () => {
        activePreset = p;
        pwrap.querySelectorAll('.sc-pill').forEach(el => el.classList.remove('active'));
        b.classList.add('active');
      };
      if (i === 0) b.click();
      pwrap.appendChild(b);
    });

    const wcs = [
      { label: 'Any length', v: null },
      { label: '15 words', v: 15 },
      { label: '50 words', v: 50 },
      { label: '100 words', v: 100 },
    ];
    const wwrap = document.getElementById('wordcounts');
    wcs.forEach((wc, i) => {
      const b = document.createElement('button');
      b.className = 'sc-pill mono small';
      b.textContent = wc.label;
      b.onclick = () => {
        activeWordCount = wc.v;
        wwrap.querySelectorAll('.sc-pill').forEach(el => el.classList.remove('active'));
        b.classList.add('active');
      };
      if (i === 0) b.click();
      wwrap.appendChild(b);
    });

    renderHistory();
  })();

  document.getElementById('go').addEventListener('click', async () => {
    const source = document.getElementById('source').value.trim();
    const status = document.getElementById('status');
    const out = document.getElementById('output');
    if (!source) { status.className = 'sc-status err'; status.textContent = 'Give it something to work with.'; return; }
    status.className = 'sc-status'; status.textContent = activeMode === 'write' ? 'Writing…' : 'Rewriting…';
    out.textContent = '';
    document.getElementById('copy').disabled = true;
    document.getElementById('reroll').disabled = true;
    try {
      const r = await fetch('/api/brand-os/copywriter', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ slug, source, presetLabel: activePreset, wordCount: activeWordCount, mode: activeMode }),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'Failed');
      out.textContent = j.output;
      status.className = 'sc-status ok'; status.textContent = 'Done.';
      document.getElementById('copy').disabled = false;
      document.getElementById('reroll').disabled = false;
      pushHistory({ ts: Date.now(), source, mode: activeMode, preset: activePreset, wordCount: activeWordCount, output: j.output });
    } catch (e) {
      status.className = 'sc-status err'; status.textContent = e.message;
      out.innerHTML = '<span class="sc-eyebrow">Waiting for input</span>';
    }
  });

  document.getElementById('copy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('output').textContent);
    const s = document.getElementById('status');
    s.className = 'sc-status ok'; s.textContent = 'Copied.';
  });
  document.getElementById('reroll').addEventListener('click', () => document.getElementById('go').click());
  document.getElementById('clearHist').addEventListener('click', () => {
    sessionStorage.removeItem(HIST_KEY); renderHistory();
  });
  document.getElementById('logout').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/api/brand-os/session', { method: 'DELETE', credentials: 'same-origin' });
    location.href = '/';
  });

  function pushHistory(entry) {
    const cur = readHistory();
    cur.unshift(entry);
    sessionStorage.setItem(HIST_KEY, JSON.stringify(cur.slice(0, 100)));
    renderHistory();
  }
  function readHistory() {
    try { return JSON.parse(sessionStorage.getItem(HIST_KEY) || '[]'); } catch { return []; }
  }
  function renderHistory() {
    const wrap = document.getElementById('history');
    const items = readHistory();
    wrap.innerHTML = '';
    if (!items.length) {
      const d = document.createElement('div');
      d.className = 'sc-status';
      d.textContent = 'Nothing yet.';
      wrap.appendChild(d); return;
    }
    for (const it of items) {
      const d = document.createElement('div');
      d.className = 'history-item';
      const wc = it.wordCount ? `${it.wordCount}w · ` : '';
      d.innerHTML = `<div class="meta">${wc}${escapeHtml(it.preset || '')}</div><div class="body">${escapeHtml(it.output)}</div>`;
      d.onclick = () => {
        document.getElementById('source').value = it.source || '';
        document.getElementById('output').textContent = it.output;
        document.getElementById('copy').disabled = false;
        document.getElementById('reroll').disabled = false;
      };
      wrap.appendChild(d);
    }
  }
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
